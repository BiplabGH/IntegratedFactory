apiVersion: apps/v1
kind: Deployment
metadata:
  name: solace-pubsub
  namespace: factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: solace-pubsub
  template:
    metadata:
      labels:
        app: solace-pubsub
    spec:
      containers:
        - name: solace
          image: solace/solace-pubsubplus:latest
          ports:
            - containerPort: 55555   # SMF
            - containerPort: 8008    # REST
            - containerPort: 1943    # MQTT TLS
          env:
            - name: username_admin_globalaccesslevel
              value: admin
            - name: username_admin_password
              valueFrom:
                secretKeyRef:
                  name: solace-secret
                  key: admin-password
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: solace-pubsub
  namespace: factory
spec:
  selector:
    app: solace-pubsub
  ports:
    - name: smf
      port: 55555
    - name: rest
      port: 8008
    - name: mqtt-tls
      port: 1943
