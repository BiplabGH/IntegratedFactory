apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx
  namespace: factory
  labels:
    app: emqx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emqx
  template:
    metadata:
      labels:
        app: emqx
    spec:
      containers:
        - name: emqx
          image: emqx/emqx:5.6
          ports:
            - containerPort: 1883
            - containerPort: 8083
            - containerPort: 18083
          volumeMounts:
            - name: emqx-config
              mountPath: /opt/emqx/etc/emqx.conf
              subPath: emqx.conf
      volumes:
        - name: emqx-config
          configMap:
            name: emqx-config
---
apiVersion: v1
kind: Service
metadata:
  name: emqx
  namespace: factory
spec:
  selector:
    app: emqx
  ports:
    - name: mqtt
      port: 1883
    - name: ws
      port: 8083
    - name: dashboard
      port: 18083
