{{- if .Values.mcpServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: {{ .Values.global.namespace }}
  labels:
    app: mcp-server
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ .Values.mcpServer.replicas }}
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: {{ .Values.global.imageRegistry }}/{{ .Values.mcpServer.image }}
          ports:
            - containerPort: {{ .Values.mcpServer.service.port }}
          env:
            - name: INFLUXDB_URL
              value: "http://influxdb:8086"
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-secret
                  key: admin-token
            - name: TIMESCALE_URL
              valueFrom:
                secretKeyRef:
                  name: timescaledb-secret
                  key: connection-string
            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: mcp-server
  ports:
    - port: {{ .Values.mcpServer.service.port }}
{{- end }}
