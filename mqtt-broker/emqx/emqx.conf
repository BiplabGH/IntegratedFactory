## EMQX Configuration for IntegratedFactory

node {
  name = "emqx@127.0.0.1"
  cookie = "factory-secret-cookie"
  data_dir = "/opt/emqx/data"
}

log {
  file {
    level = info
    path = "/opt/emqx/log/emqx.log"
  }
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 10000
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
}

dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "admin"
  default_password = "factory-admin"
}

# Retained messages for last known machine state
retainer {
  enable = true
  msg_expiry_interval = 3600s
}

# MQTT bridge to Kafka via Kafka-connect (handled externally)
# Topic hierarchy: factory/{zone}/{machine_type}/{machine_id}
