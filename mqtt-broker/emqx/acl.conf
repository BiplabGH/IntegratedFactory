## EMQX ACL Rules
## Format: {allow | deny, all | {user, "Username"} | {ipaddr, "IPAddr"}, publish | subscribe | all, ["TopicFilter"]}

{allow, {user, "opcua-simulator"}, publish, ["factory/#"]}.
{allow, {user, "mqtt-bridge"}, subscribe, ["factory/#"]}.
{allow, {user, "mqtt-bridge"}, publish, ["factory/#"]}.
{allow, {user, "mcp-server"}, subscribe, ["factory/#"]}.
{deny, all}.
