version: "3.9"

networks:
  factory-net:
    driver: bridge

volumes:
  emqx-data:
  kafka-data:
  zookeeper-data:
  influxdb-data:
  timescaledb-data:

services:
  # ── EMQX MQTT Broker ────────────────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.6
    container_name: emqx
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # MQTT over WebSocket
      - "18083:18083"  # Dashboard
    volumes:
      - emqx-data:/opt/emqx/data
      - ./mqtt-broker/emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
    networks: [factory-net]

  # ── Zookeeper ────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper
    networks: [factory-net]

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [factory-net]

  # ── Kafka Connect ─────────────────────────────────────────────────────────
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    container_name: kafka-connect
    depends_on: [kafka]
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: factory-connect
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    networks: [factory-net]

  # ── InfluxDB ──────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: factory-admin
      DOCKER_INFLUXDB_INIT_ORG: IntegratedFactory
      DOCKER_INFLUXDB_INIT_BUCKET: raw_historian
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: factory-dev-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks: [factory-net]

  # ── TimescaleDB ───────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory-pass
      POSTGRES_DB: factory_agg
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./historian/timescaledb/migrations:/docker-entrypoint-initdb.d:ro
    networks: [factory-net]

  # ── OPC-UA Simulator ─────────────────────────────────────────────────────
  opcua-simulator:
    build: ./opcua-simulator
    container_name: opcua-simulator
    ports:
      - "4840:4840"
    environment:
      MQTT_BROKER: emqx
      MQTT_PORT: 1883
    depends_on: [emqx]
    networks: [factory-net]

  # ── MQTT Bridge ───────────────────────────────────────────────────────────
  mqtt-bridge:
    build: ./mqtt-broker/bridge
    container_name: mqtt-bridge
    environment:
      MQTT_BROKER: emqx
      MQTT_PORT: 1883
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on: [emqx, kafka]
    networks: [factory-net]

  # ── Historian Writer ──────────────────────────────────────────────────────
  historian-writer:
    build: ./historian/writer
    container_name: historian-writer
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: factory-dev-token
      INFLUXDB_ORG: IntegratedFactory
      TIMESCALE_URL: postgresql://factory:factory-pass@timescaledb:5432/factory_agg
    depends_on: [kafka, influxdb, timescaledb]
    networks: [factory-net]

  # ── MCP Server ────────────────────────────────────────────────────────────
  mcp-server:
    build: ./mcp-server
    container_name: mcp-server
    ports:
      - "3000:3000"
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: factory-dev-token
      TIMESCALE_URL: postgresql://factory:factory-pass@timescaledb:5432/factory_agg
      KAFKA_BOOTSTRAP: kafka:29092
    depends_on: [influxdb, timescaledb]
    networks: [factory-net]
